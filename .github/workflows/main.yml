name: Build Strafe

on:
  push:
    branches: [ main, test ]
  pull_request:
    branches: [ main, test ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest   # Tauri Windows builds need Windows runner

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20   # or whatever version you're using

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri dependencies
        run: |
          # Add any system dependencies if needed (WebView2, etc.)

      - name: Install npm dependencies
        run: npm ci

      # ==================== BUILD STEP ====================
      - name: Build Tauri app (standalone .exe on test branch)
        if: github.ref_name == 'test'
        run: |
          npm run tauri build -- --target x86_64-pc-windows-msvc --no-bundle

      - name: Build Tauri app (full installer on main)
        if: github.ref_name == 'main'
        run: |
          npm run tauri build   # or with specific flags if you have custom config

      # ==================== UPLOAD ARTIFACTS ====================
      - name: Upload standalone .exe (test branch only)
        if: github.ref_name == 'test'
        uses: actions/upload-artifact@v4
        with:
          name: strafe-standalone-exe
          path: src-tauri/target/release/*.exe   # adjust path if your .exe is elsewhere
          if-no-files-found: error

      - name: Upload installers (main branch only)
        if: github.ref_name == 'main'
        uses: actions/upload-artifact@v4
        with:
          name: strafe-installers
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe   # or whatever installer type you use
          if-no-files-found: error
