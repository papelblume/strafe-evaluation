name: 'publish'

on:
  push:
    branches:
      - test

jobs:
  publish-tauri:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      # 1. Setup Node with npm caching (this caches node_modules)
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'                    # ← This is the important part

      # 2. Install Rust stable
      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      # 3. Rust + Cargo caching (this is what you were missing)
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri'       # Important: point to your Tauri Rust folder

      # 4. Install system dependencies (only for Linux — you can ignore for now since you're on Windows)
      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04' || matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      # 5. Install frontend dependencies (uses the npm cache from step 1)
      - name: install frontend dependencies
        run: npm ci                     # Changed from "npm install" → "npm ci" (faster + more reliable with cache)

      # 6. (Optional but recommended) Build the frontend first
      # This makes the tauri-action step cleaner and sometimes faster
      - name: build frontend
        run: npm run build

      # 7. Tauri build + release
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__
          releaseName: 'App v__VERSION__'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
          # You can add projectPath: './src-tauri' if needed (usually not required)
